version: "3.9"

volumes:
  powerdns-db-data:
    name: powerdns-db-data

services:
  db:
    image: mariadb:10
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: l3tmein
    volumes:
      - powerdns-db-data:/var/lib/mysql

  powerdns:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: octodns-powerdns-dev
    ports:
      - "8053:53/tcp"
      - "8053:53/udp"
      - "8081:8081"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: l3tmein
      DB_NAME: pdns
      API_KEY: its@secret
      WEBSERVER_PASSWORD: its@secret
    depends_on:
      - db
    volumes:
      # :z relabels for SELinux on Fedora/RHEL hosts; harmless elsewhere.
      # Stub geoipbackend zones file — loaded only so the backend has something
      # to chew on; real zones are served by gmysql.
      - ./docker/geoip.yaml:/etc/powerdns/geoip.yaml:ro,z
      # Synthetic MaxMind test data (Apache-2.0). See
      # docker/GeoIP2-City-Test.mmdb.NOTICE.
      - ./docker/GeoIP2-City-Test.mmdb:/etc/powerdns/GeoIP2-City-Test.mmdb:ro,z
